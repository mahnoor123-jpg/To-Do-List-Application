
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTask - To-Do List</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 { text-align: center; margin-bottom: 1.5rem; color: var(--primary); }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        button#add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        ul { list-style: none; }

        li {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f1f5f9;
            margin-bottom: 8px;
            border-radius: 6px;
            gap: 10px;
        }

        .task-text { flex: 1; transition: 0.2s; }
        .completed { text-decoration: line-through; color: var(--text-muted); }

        .btn-icon { border: none; background: none; cursor: pointer; font-size: 1.2rem; }
        .btn-delete { color: var(--danger); }
        .btn-edit { color: var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Tasks</h1>
        
        <form id="todo-form" class="input-group">
            <input type="text" id="todo-input" placeholder="Enter a task..." required>
            <button type="submit" id="add-btn">Add</button>
        </form>

        <ul id="todo-list"></ul>
    </div>

    <script>
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');

        // --- LOCAL STORAGE LOGIC ---

        // 1. Initialize tasks by fetching from LocalStorage
        let tasks = [];
        const savedData = localStorage.getItem('myTodoTasks');
        
        if (savedData) {
            tasks = JSON.parse(savedData);
        }

        // 2. Function to Save to LocalStorage
        function saveToDisk() {
            localStorage.setItem('myTodoTasks', JSON.stringify(tasks));
            renderTasks();
        }

        // 3. Render Tasks to Screen
        function renderTasks() {
            todoList.innerHTML = "";
            
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index})">
                    <span class="task-text ${task.completed ? 'completed' : ''}">${task.text}</span>
                    <button class="btn-icon btn-edit" onclick="editTask(${index})">✏️</button>
                    <button class="btn-icon btn-delete" onclick="deleteTask(${index})">🗑️</button>
                `;
                todoList.appendChild(li);
            });
        }

        // 4. Add Task
        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = todoInput.value.trim();
            if (text) {
                tasks.push({ text: text, completed: false });
                todoInput.value = "";
                saveToDisk(); // Save and Refresh
            }
        });

        // 5. Delete Task
        function deleteTask(index) {
            tasks.splice(index, 1);
            saveToDisk(); // Save and Refresh
        }

        // 6. Toggle Complete
        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveToDisk(); // Save and Refresh
        }

        // 7. Edit Task
        function editTask(index) {
            const newText = prompt("Edit your task:", tasks[index].text);
            if (newText !== null && newText.trim() !== "") {
                tasks[index].text = newText.trim();
                saveToDisk(); // Save and Refresh
            }
        }

        // Initial Load
        renderTasks();
    </script>
</body>
</html>
